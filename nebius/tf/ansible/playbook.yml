    - name: Check for NCCL in CUDA installation
      stat:
        path: /usr/local/cuda/lib64/libnccl.so
      register: nccl_cuda_check

    - name: Find NCCL location
      shell: |
        if [ -f /usr/local/cuda/lib64/libnccl.so ]; then
          echo "/usr/local/cuda"
        elif [ -f /usr/lib/x86_64-linux-gnu/libnccl.so ]; then
          echo "/usr"
        else
          # Try to find it anywhere
          find /usr -name "libnccl.so*" 2>/dev/null | head -1 | xargs dirname | xargs dirname || echo "/usr/local/cuda"
        fi
      register: nccl_home
      changed_when: false

    - name: Display NCCL location
      debug:
        msg: "NCCL found at: {{ nccl_home.stdout }}"

    - name: Clone NCCL tests repository
      git:
        repo: 'https://github.com/NVIDIA/nccl-tests.git'
        dest: /home/ubuntu/nccl-tests
        version: master
      become_user: ubuntu

    - name: Clean previous NCCL test builds
      shell: cd /home/ubuntu/nccl-tests && make clean
      args:
        removes: /home/ubuntu/nccl-tests/build
      become_user: ubuntu
      ignore_errors: yes

    # - name: Build NCCL tests with MPI
    #   shell: |
    #     cd /home/ubuntu/nccl-tests
