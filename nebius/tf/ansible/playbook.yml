    #     LD_LIBRARY_PATH: "/usr/local/cuda/lib64:{{ nccl_home.stdout }}/lib64:/usr/local/lib:/usr/local/cuda/lib"
    #   when: mpi_check.stdout != "none"

    - name: Create NCCL test wrapper script
      copy:
        dest: /home/ubuntu/run_nccl_test.sh
        owner: ubuntu
        group: ubuntu
        mode: '0755'
        content: |
          #!/bin/bash
          # NCCL multi-node test wrapper

          REMOTE_HOST="${1:-gpu2}"
          TEST="${2:-all_reduce_perf}"

          # Set library paths
          export PATH="/usr/local/bin:/usr/local/cuda/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/local/lib:/usr/local/cuda/lib64:{{ nccl_home.stdout }}/lib64:$LD_LIBRARY_PATH"

          cd /home/ubuntu/nccl-tests

          echo "════════════════════════════════════════════════════════════"
          echo "  NCCL Multi-Node Test"
          echo "════════════════════════════════════════════════════════════"
          echo "  Local:  $(hostname)"
          echo "  Remote: $REMOTE_HOST"
          echo "  Test:   $TEST"
          echo "  MPI:    $(which mpirun)"
          echo "════════════════════════════════════════════════════════════"
          echo ""

          mpirun --allow-run-as-root \
            -np 2 \
            -H localhost:1,$REMOTE_HOST:1 \
            -x PATH \
            -x LD_LIBRARY_PATH \
            -x NCCL_DEBUG=INFO \
            -x NCCL_SOCKET_IFNAME=eth0 \
            --mca btl_tcp_if_include eth0 \
            ./build/${TEST} -b 8 -e 256M -f 2 -g 1
